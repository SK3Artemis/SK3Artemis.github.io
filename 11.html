<html>
<head>
<title>!SK_</title>
<link rel="icon" type="image/x-iconf" href="./b/icon.png">
<style type="text/css">*,html,body{background:grey;}</style>
<script>if ('undefined' == typeof Symbol || 'undefined' == typeof Symbol.iterator) {delete Array.prototype.entries;}</script>
</head>
<body>
<img src="./media/monkey.png">
<p>Simple YouTube Search</p>
<a href="https://www.youtube.com/" title="YouTube"><span>Youtube</span></a>
<form id="search" action="https://www.youtube.com/results" onsubmit="if (document.getElementById('search-input').value == '') return false;">
<div>
<input id="search-input" autocomplete="off" value="" type="text" placeholder="Search Input" title="Search" name="search_query" onkeydown="if (!this.value &amp;&amp; (event.keyCode == 40 || event.keyCode == 32 || event.keyCode == 34)) {this.onkeydown = null; this.blur();}">
</div>
<button id="search-button" type="submit" onclick="if (document.getElementById('search-input').value == '') return false; document.getElementById('search').submit(); return false;">
<span>Search</span>
</button>
</form>
</body>
</html>
